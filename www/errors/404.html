<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: #1b1f23;
            color: #e6e6e6;
        }
        .box {
            text-align: center;
            padding: 2rem 3rem;
        }
        h1 {
            margin: 0;
            font-size: 6rem;
            letter-spacing: 0.05em;
            color: #ff6b6b;
        }
        p {
            margin: 0.5rem 0 1.5rem;
            font-size: 1.1rem;
            color: #9aa0a6;
        }
        a {
            color: #4dabf7;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .tag {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #5c6370;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>404</h1>
        <p>The page you requested could not be found.</p>
        <a href="/">&larr; Back to home</a>
        <div class="tag">Webserv/1.0</div>
    </div>
</body>
</html>
