server {
    listen 8080;
    listen 127.0.0.1:8081;
    server_name example.com;
    error_page 404 /errors/404.html;
    client_max_body_size 0;

    location / {
        root www/;
        index index.html;
        methods GET;
        autoindex off;
    }

    location /upload {
        methods GET POST DELETE;
        root www/upload;
        upload_store www/upload;
        autoindex on;
    }

    location /old {
        return 301 /new;
    }

    location /cgi-bin {
        methods GET POST;
		root cgi-bin/;
		cgi .bla cgi_tester;
		cgi .py /usr/bin/python3;
        cgi .php /usr/bin/php-cgi;
		cgi .cgi ;
		cgi_timeout 3;
    }

    location /post_body {
        root www/;
        index index.html;
        methods POST;
        autoindex off;
        client_max_body_size 100;
    }

    location /directory {
        root tests/YoupiBanane/;
        index youpi.bad_extension;
        upload_store tests/YoupiBanane/;
        cgi .bla tests/cgi_tester;
        methods GET POST;
        autoindex off;
    }
}

server {
    # listen 8081;
    listen 8082;
    server_name second.local;
    client_max_body_size 1000;
}

# Second virtual host on the SAME port as example.com (8080). Requests are
# routed to it by the Host header; anything that doesn't match a server_name
# falls back to the first server on the port (example.com).
server {
    listen 8080;
    server_name vhost2.local;
    # Deliberately smaller than example.com's 1000000 so a per-vhost body-size
    # check can prove the limit follows the resolved Host, not the port default.
    client_max_body_size 1000;

    location / {
        return 301 /routed-to-vhost2;
    }
}